<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CARYSIL LOGIN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);

}


.login-box{

width:480px;

padding:45px;

background:rgba(255,255,255,0.10);

backdrop-filter:blur(15px);

border-radius:20px;

box-shadow:0 0 35px rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.2);

}



h1{

text-align:center;

font-size:32px;

color:white;

margin-bottom:8px;

}


p{

text-align:center;

color:#dbeafe;

margin-bottom:35px;

font-size:15px;

}



label{

display:block;

color:white;

font-size:16px;

margin-bottom:8px;

}



input{

width:100%;

padding:14px;

border:none;

border-radius:10px;

margin-bottom:20px;

font-size:16px;

}



button{

width:100%;

padding:15px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

transition:0.3s;

}


button:hover{

background:#1d4ed8;

}


.footer{

text-align:center;

margin-top:25px;

color:#cbd5e1;

font-size:13px;

}


</style>

</head>

<body>


<div class="login-box">


<h1>CARYSIL</h1>

<p>MASTER INVENTORY MANAGEMENT SYSTEM</p>



<form method="POST">


<label>👤 Username</label>

<input type="text"
name="username"
placeholder="Enter Username"
required>



<label>🔒 Password</label>

<input type="password"
name="password"
placeholder="Enter Password"
required>



<button type="submit">

LOGIN

</button>


</form>


<div class="footer">

© 2026 CARYSIL SOM ASSOCIATES

</div>


</div>


</body>

</html>
