<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM ASSOCIATES - BILL BOOK</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .bill-card { background: white; border-top: 5px solid #b31b1b; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .table-head { background-color: #b31b1b; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="p-4 bill-card">
        <h3 class="text-center mb-4 font-weight-bold" style="color: #b31b1b;">SOM ASSOCIATES BILL DESK</h3>
        
        <!-- Customer Details Info Form -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Party Name & Address</label>
                <input type="text" id="partyName" class="form-control" placeholder="Enter name and location">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Mobile No.</label>
                <input type="text" id="mobileNo" class="form-control" placeholder="10-digit number">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Bill No.</label>
                <input type="text" id="billNo" class="form-control" placeholder="e.g. SOM-620">
            </div>
        </div>

        <!-- Dynamic Items Row Table -->
        <h5 class="fw-bold mb-3">Particulars Section</h5>
        <table class="table table-bordered align-middle">
            <thead class="table-head">
                <tr>
                    <th>Particulars (Product Name)</th>
                    <th style="width: 12%;">Size</th>
                    <th style="width: 15%;">Colour</th>
                    <th style="width: 10%;">Qty</th>
                    <th style="width: 15%;">Rate</th>
                </tr>
            </thead>
            <tbody id="billItemsBody">
                <tr>
                    <td><input type="text" class="form-control part-input" placeholder="e.g. HARMONY SD 780"></td>
                    <td><input type="text" class="form-control size-input"></td>
                    <td><input type="text" class="form-control color-input"></td>
                    <td><input type="number" class="form-control qty-input" value="1"></td>
                    <td><input type="number" class="form-control rate-input" value="0"></td>
                </tr>
            </tbody>
        </table>
        
        <button class="btn btn-dark btn-sm mb-4" onclick="addNewRow()">+ Add Item Row</button>
        <div class="text-end">
            <button class="btn btn-success btn-lg px-5" onclick="submitAndDownloadBill()">💾 Submit Bill & Print PDF</button>
        </div>
    </div>
</div>

<script>
    function addNewRow() {
        let tbody = document.getElementById('billItemsBody');
        let firstRow = tbody.rows[0];
        let newRow = firstRow.cloneNode(true);
        let inputs = newRow.getElementsByTagName('input');
        inputs[0].value = ''; inputs[1].value = ''; inputs[2].value = '';
        inputs[3].value = 1; inputs[4].value = 0;
        tbody.appendChild(newRow);
    }

    function submitAndDownloadBill() {
        let items = [];
        let rows = document.getElementById('billItemsBody').rows;
        
        for(let i=0; i<rows.length; i++) {
            items.push({
                particulars: rows[i].querySelector('.part-input').value,
                size: rows[i].querySelector('.size-input').value,
                colour: rows[i].querySelector('.color-input').value,
                qty: rows[i].querySelector('.qty-input').value,
                rate: rows[i].querySelector('.rate-input').value
            });
        }

        let billData = {
            bill_no: document.getElementById('billNo').value,
            party_name: document.getElementById('partyName').value,
            address: document.getElementById('partyName').value,
            mobile_no: document.getElementById('mobileNo').value,
            bill_date: new Date().toLocaleDateString('en-IN'),
            items: items
        };

        fetch('/api/generate_bill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(billData)
        })
        .then(response => {
            if (response.ok) return response.blob();
            return response.json().then(err => { throw new Error(err.message); });
        })
        .then(blob => {
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `Bill_${billData.bill_no}.pdf`;
            a.click();
            alert("Bill successfully saved and stock deducted!");
        })
        .catch(err => alert("Billing Error: " + err.message));
    }
</script>
</body>
</html>
